services:
  postgres:
    image: postgres:16-alpine
    container_name: saashakti-postgres
    environment:
      POSTGRES_USER: saashakti
      POSTGRES_PASSWORD: saashakti
      POSTGRES_DB: saashakti
    ports:
      - "5432:5432"
    volumes:
      - saashakti-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saashakti -d saashakti"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: saashakti-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  saashakti-pg-data:
